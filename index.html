<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مستشار برنامج القطاع الخاص - أمانة منطقة الرياض</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:#f0f4f2;min-height:100vh;display:flex;flex-direction:column}
.hdr{background:linear-gradient(135deg,#0a3d2e 0%,#1a6b4a 100%);padding:14px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(10,61,46,.3)}
.hdr-logo{height:52px;width:auto}
.hdr-text h1{color:#fff;font-size:16px;font-weight:700;line-height:1.3}
.hdr-text p{color:rgba(255,255,255,.65);font-size:11px;margin-top:2px}
.badge{margin-right:auto;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.85);padding:5px 12px;border-radius:20px;font-size:11px;display:flex;align-items:center;gap:5px}
.badge::before{content:'';width:7px;height:7px;background:#4ade80;border-radius:50%;display:inline-block}
.main{display:flex;flex:1;max-width:1100px;margin:0 auto;width:100%;padding:18px 14px;gap:16px}
.sb{width:240px;flex-shrink:0;display:flex;flex-direction:column;gap:12px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(10,61,46,.07);overflow:hidden}
.ctitle{background:#eef5f0;padding:10px 14px;font-size:11px;font-weight:700;color:#0a3d2e;border-bottom:1px solid #dce8e1;text-transform:uppercase;letter-spacing:.5px}
.nbtn{width:100%;background:linear-gradient(135deg,#1a6b4a,#2d9b6b);color:#fff;border:none;padding:12px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border-radius:12px;transition:.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.nbtn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(26,107,74,.3)}
.hist{list-style:none;padding:6px}
.hist li{padding:8px 11px;border-radius:8px;cursor:pointer;font-size:12px;color:#3a5a4a;transition:.15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px}
.hist li::before{content:"\1F4AC";font-size:11px;flex-shrink:0}
.hist li:hover,.hist li.act{background:#eef5f0;color:#0a3d2e}
.qqs{padding:6px;display:flex;flex-direction:column;gap:4px}
.qq{width:100%;background:none;border:1px solid #dce8e1;border-radius:8px;padding:9px 11px;font-family:'Tajawal',sans-serif;font-size:11.5px;color:#3a5a4a;cursor:pointer;text-align:right;transition:.15s;line-height:1.5}
.qq:hover{background:#eef5f0;border-color:#2d9b6b;color:#0a3d2e}
.ca{flex:1;display:flex;flex-direction:column;min-width:0}
.wlc{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(10,61,46,.07)}
.wlc h2{font-size:21px;font-weight:800;color:#0a3d2e;margin-bottom:8px}
.wlc-sub{font-size:13.5px;color:#5a7a6a;max-width:380px;line-height:1.8;margin-bottom:24px}
.div{width:50px;height:3px;background:linear-gradient(90deg,#1a6b4a,#c8a951);border-radius:2px;margin:0 auto 22px}
.stats{display:flex;gap:24px;justify-content:center;margin-bottom:28px}
.stat{text-align:center}
.sn{font-size:28px;font-weight:800;color:#1a6b4a}
.sl{font-size:11px;color:#6b8c7a;margin-top:3px}
.cw{flex:1;display:none;flex-direction:column;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(10,61,46,.07);overflow:hidden}
.cw.act{display:flex}
.msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;min-height:400px}
.msg{display:flex;gap:10px;max-width:85%;animation:fu .3s ease}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.u{align-self:flex-start;flex-direction:row-reverse}
.msg.a{align-self:flex-end}
.av{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg.u .av{background:#eef5f0}
.msg.a .av{background:linear-gradient(135deg,#1a6b4a,#2d9b6b);color:#fff;font-size:11px;font-weight:700}
.bbl{padding:11px 15px;border-radius:12px;font-size:13px;line-height:1.8}
.msg.u .bbl{background:#eef5f0;color:#0d1f18;border-top-right-radius:4px}
.msg.a .bbl{background:linear-gradient(135deg,#0a3d2e,#1a6b4a);color:#fff;border-top-left-radius:4px}
.msg.a .bbl ul,.msg.a .bbl ol{padding-right:18px;margin:6px 0}
.msg.a .bbl li{margin:3px 0}
.typ{display:flex;gap:4px;align-items:center;padding:4px 0}
.typ span{width:7px;height:7px;background:rgba(255,255,255,.6);border-radius:50%;animation:b 1s infinite}
.typ span:nth-child(2){animation-delay:.15s}.typ span:nth-child(3){animation-delay:.3s}
@keyframes b{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.inp{padding:12px 16px;border-top:1px solid #e8eee8;background:#fff;display:flex;gap:8px;align-items:flex-end}
.inpw{flex:1;background:#f4f8f5;border:1.5px solid #dce8e1;border-radius:10px;display:flex;align-items:center;padding:0 12px;transition:.2s}
.inpw:focus-within{border-color:#2d9b6b;background:#fff}
#ui{flex:1;background:none;border:none;outline:none;font-family:'Tajawal',sans-serif;font-size:13px;color:#0d1f18;padding:12px 0;resize:none;min-height:44px;max-height:110px}
#ui::placeholder{color:#7a9a8a}
.sbtn{width:44px;height:44px;background:linear-gradient(135deg,#1a6b4a,#2d9b6b);border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;transition:.2s;flex-shrink:0}
.sbtn:hover{transform:scale(1.05)}.sbtn:disabled{opacity:.4;cursor:not-allowed;transform:none}
@media(max-width:768px){.sb{display:none}.main{padding:8px}}
</style>
</head>

function srch(q){
  var ws=q.toLowerCase().replace(/[،,.؟?]/g,'').split(' ').filter(function(w){return w.length>1;});
  return DATA_CHALLENGES.map(function(e){
    var t=(e.t+' '+e.s+' '+e.c+' '+e.st).toLowerCase();
    return Object.assign({},e,{score:ws.reduce(function(s,w){return s+(t.indexOf(w)>=0?1:0);},0)});
  }).filter(function(e){return e.score>0;}).sort(function(a,b){return b.score-a.score;}).slice(0,20);
}
function newChat(){
  var conv={id:Date.now(),title:'محادثة جديدة',messages:[]};
  convs.unshift(conv);cur=conv;
  document.getElementById('ws').style.display='none';
  document.getElementById('cw').classList.add('act');
  document.getElementById('msgs').innerHTML='';
  renderH();document.getElementById('ui').focus();
}
function renderH(){
  var el=document.getElementById('hist');
  if(!convs.length){el.innerHTML='<li style="color:#7a9a8a;font-size:12px;padding:12px;cursor:default">لا توجد محادثات سابقة</li>';return;}
  el.innerHTML=convs.map(function(c){return '<li class="'+(c.id===cur.id?'act':'')+'" onclick="swch('+c.id+')">'+c.title+'</li>';}).join('');
}
function swch(id){
  cur=convs.find(function(c){return c.id===id;});
  document.getElementById('ws').style.display='none';
  document.getElementById('cw').classList.add('act');
  document.getElementById('msgs').innerHTML='';
  cur.messages.forEach(function(m){addMsg(m.role,m.content,false);});renderH();
}
function addMsg(role,content,animate){
  if(animate===undefined)animate=true;
  var msgs=document.getElementById('msgs');
  var div=document.createElement('div');
  div.className='msg '+(role==='user'?'u':'a');
  div.innerHTML='<div class="av">'+(role==='user'?'\u{1F464}':'أم')+'</div><div class="bbl">'+content.replace(/\n/g,'<br>')+'</div>';
  if(!animate)div.style.animation='none';
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}
function addTyp(){
  var msgs=document.getElementById('msgs');
  var div=document.createElement('div');
  div.className='msg a';div.id='typ';
  div.innerHTML='<div class="av">أم</div><div class="bbl"><div class="typ"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}
async function send(){
  if(loading)return;
  var input=document.getElementById('ui');
  var text=input.value.trim();
  if(!text)return;
  if(!cur)newChat();
  input.value='';input.style.height='auto';
  loading=true;document.getElementById('sb').disabled=true;
  addMsg('user',text);
  cur.messages.push({role:'user',content:text});
  if(cur.title==='محادثة جديدة'){cur.title=text.slice(0,30)+(text.length>30?'..':'');renderH();}
  addTyp();
  var rel=srch(text);
  var ctx=rel.length>0?('تحديات ذات صلة:\n'+rel.map(function(e){return '- '+e.t+' | '+e.s+' ('+e.y+') | الحالة: '+e.st;}).join('\n')):'';
  var sys=document.getElementById('sysPrompt').textContent;
  var msgs=cur.messages.slice(-6).slice(0,-1).concat([{role:'user',content:'السؤال: '+text+(ctx?'\n\n'+ctx:'')}]);
  try{
    var res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:msgs,system:sys})});
    var data=await res.json();
    var t=document.getElementById('typ');if(t)t.remove();
    var reply=data.content&&data.content[0]?data.content[0].text:'حدث خطأ.';
    addMsg('assistant',reply);cur.messages.push({role:'assistant',content:reply});
  }catch(e){
    var t=document.getElementById('typ');if(t)t.remove();
    addMsg('assistant','حدث خطأ في الاتصال، حاول مرة أخرى.');
  }
  loading=false;document.getElementById('sb').disabled=false;
}
function askQ(q){if(!cur)newChat();document.getElementById('ui').value=q;send();}

خطة التواصل والمتابعة بعد اللقاء الأول
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
4 محاور رئيسية:
1. ورش العمل مع تجمعات القطاع الخاص — ورش دورية لاستقبال التحديات ومناقشة الحلول
2. الشراكة مع غرفة الرياض — فريق عمل مشترك
3. تفعيل قناة التواصل الإلكترونية — منصة استقبال التحديات على مدار الساعة
4. متابعة تنفيذ المبادرات والتحديات — متابعة المبادرات المُعلنة في اللقاء الأول

الفريق المشترك مع غرفة الرياض:
من الأمانة (5 أعضاء):
- مستشار سمو الأمين
- مدير عام مكتب إدارة المشاريع المؤسسية
- مدير عام العلاقات العامة
- ممثل الإدارة العامة للابتكار وتطوير الأعمال
- ممثل إدارة الابتكار

من غرفة الرياض (4 أعضاء):
- نائب الأمين العام
- مكتب الاستراتيجية
- الإدارة التنفيذية للجان
- مكتب المتابعة والتمكين

حالة الاجتماعات: عُقد أكثر من اجتماع وهناك تواصل مستمر مع غرفة الرياض

مبادرات الشراكة الأربع مع غرفة الرياض:
1. التعاون في معالجة التحديات — إعداد دراسات وورش عمل بالتنسيق مع الوكالات
2. ورش العمل التدريبية المشتركة — تنظيم ورش في ريادة الأعمال والتطوع
3. الدعم اللوجستي لورش القطاع — تقديم الدعم اللوجستي للورش التعريفية
4. دراسة الدروس المستفادة — استخلاص دروس من غرف مناطق أخرى

المواضيع المقترحة للدراسة المشتركة:
1. إيواء الشاحنات والمداخل اللوجستية — دراسة تحديات إيواء الشاحنات وتنظيم المداخل داخل منطقة الرياض
2. مراكز لوجستية مصغّرة (Urban Micro Hubs) — الاستفادة من أصول الأمانة كالحدائق لتوفير وحدات تخزين
