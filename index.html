<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مستشار برنامج القطاع الخاص - أمانة منطقة الرياض</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:#f0f4f2;min-height:100vh;display:flex;flex-direction:column}
.hdr{background:linear-gradient(135deg,#0a3d2e 0%,#1a6b4a 100%);padding:14px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(10,61,46,.3)}
.hdr-text h1{color:#fff;font-size:16px;font-weight:700;line-height:1.3}
.hdr-text p{color:rgba(255,255,255,.65);font-size:11px;margin-top:2px}
.badge{margin-right:auto;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.85);padding:5px 12px;border-radius:20px;font-size:11px;display:flex;align-items:center;gap:5px}
.badge::before{content:'';width:7px;height:7px;background:#4ade80;border-radius:50%;display:inline-block}
.main{display:flex;flex:1;max-width:1100px;margin:0 auto;width:100%;padding:18px 14px;gap:16px}
.sb{width:240px;flex-shrink:0;display:flex;flex-direction:column;gap:12px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(10,61,46,.07);overflow:hidden}
.ctitle{background:#eef5f0;padding:10px 14px;font-size:11px;font-weight:700;color:#0a3d2e;border-bottom:1px solid #dce8e1}
.nbtn{width:100%;background:linear-gradient(135deg,#1a6b4a,#2d9b6b);color:#fff;border:none;padding:12px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border-radius:12px;transition:.2s}
.nbtn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(26,107,74,.3)}
.hist{list-style:none;padding:6px}
.hist li{padding:8px 11px;border-radius:8px;cursor:pointer;font-size:12px;color:#3a5a4a;transition:.15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist li:hover,.hist li.act{background:#eef5f0;color:#0a3d2e}
.qqs{padding:6px;display:flex;flex-direction:column;gap:4px}
.qq{width:100%;background:none;border:1px solid #dce8e1;border-radius:8px;padding:9px 11px;font-family:'Tajawal',sans-serif;font-size:11.5px;color:#3a5a4a;cursor:pointer;text-align:right;transition:.15s;line-height:1.5}
.qq:hover{background:#eef5f0;border-color:#2d9b6b;color:#0a3d2e}
.ca{flex:1;display:flex;flex-direction:column;min-width:0}
.wlc{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(10,61,46,.07)}
.wlc h2{font-size:21px;font-weight:800;color:#0a3d2e;margin-bottom:8px}
.wlc-sub{font-size:13.5px;color:#5a7a6a;max-width:380px;line-height:1.8;margin-bottom:24px}
.div{width:50px;height:3px;background:linear-gradient(90deg,#1a6b4a,#c8a951);border-radius:2px;margin:0 auto 22px}
.sn{font-size:28px;font-weight:800;color:#1a6b4a}
.sl{font-size:11px;color:#6b8c7a;margin-top:3px}
.cw{flex:1;display:none;flex-direction:column;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(10,61,46,.07);overflow:hidden}
.cw.act{display:flex}
.msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;min-height:400px}
.msg{display:flex;gap:10px;max-width:85%;animation:fu .3s ease}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.u{align-self:flex-start;flex-direction:row-reverse}
.msg.a{align-self:flex-end}
.av{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg.u .av{background:#eef5f0}
.msg.a .av{background:linear-gradient(135deg,#1a6b4a,#2d9b6b);color:#fff;font-size:11px;font-weight:700}
.bbl{padding:11px 15px;border-radius:12px;font-size:13px;line-height:1.8}
.msg.u .bbl{background:#eef5f0;color:#0d1f18;border-top-right-radius:4px}
.msg.a .bbl{background:linear-gradient(135deg,#0a3d2e,#1a6b4a);color:#fff;border-top-left-radius:4px}
.msg.a .bbl ul{padding-right:18px;margin:6px 0}
.msg.a .bbl li{margin:3px 0}
.typ{display:flex;gap:4px;align-items:center;padding:4px 0}
.typ span{width:7px;height:7px;background:rgba(255,255,255,.6);border-radius:50%;animation:b 1s infinite}
.typ span:nth-child(2){animation-delay:.15s}.typ span:nth-child(3){animation-delay:.3s}
@keyframes b{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.inp{padding:12px 16px;border-top:1px solid #e8eee8;background:#fff;display:flex;gap:8px;align-items:flex-end}
.inpw{flex:1;background:#f4f8f5;border:1.5px solid #dce8e1;border-radius:10px;display:flex;align-items:center;padding:0 12px;transition:.2s}
.inpw:focus-within{border-color:#2d9b6b;background:#fff}
#ui{flex:1;background:none;border:none;outline:none;font-family:'Tajawal',sans-serif;font-size:13px;color:#0d1f18;padding:12px 0;resize:none;min-height:44px;max-height:110px}
#ui::placeholder{color:#7a9a8a}
.sbtn{width:44px;height:44px;background:linear-gradient(135deg,#1a6b4a,#2d9b6b);border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;transition:.2s;flex-shrink:0}
.sbtn:hover{transform:scale(1.05)}.sbtn:disabled{opacity:.4;cursor:not-allowed;transform:none}
@media(max-width:768px){.sb{display:none}.main{padding:8px}}
</style></head><body>

    <h2>مرحباً بك في مستشار برنامج القطاع الخاص</h2>
    <div class="div"></div>
    <p class="wlc-sub">أنا هنا لمساعدتك بكل ما يتعلق ببرنامج أمانة منطقة الرياض مع القطاع الخاص</p>

<script>
var sys=`أنت مستشار ذكي لبرنامج القطاع الخاص لأمانة منطقة الرياض.
لديك فهم عميق بكل البيانات وقادر على ربط المعلومات واستنتاج الأنماط والتحليل المعمّق.

المبدأ: فكّر بعمق. ابحث عن الترابطات. استنتج الأنماط قبل الجواب.

قاعدة خارج النطاق (مهمة جداً):
- إذا كان السؤال عن رياضة أو طقس أو أخبار عامة أو أي شيء لا علاقة له بالبرنامج = قل فقط: "هذا السؤال خارج نطاق بيانات برنامج القطاع الخاص، يسعدني مساعدتك في أي سؤال متعلق ببرنامج أمانة منطقة الرياض مع القطاع الخاص." ثم توقف ولا تضيف شيئاً
- لا تقل "خارج النطاق" ثم تجاوب — إما هذا أو ذاك
- أي سؤال عن اللقاءات أو الورش أو التحديات أو الأمانة أو البرنامج = أجب مباشرة
- معلومة غير موجودة في البيانات: "هذه المعلومة غير متوفرة في بيانات المشروع"

قواعد الجواب:
- لا ## أو ** أو نجوم - نقاط (-) للقوائم - اذهب للجواب مباشرة
- جميع تحديات اللقاء الأول (25): تم التنفيذ

تصحيح أسماء مصادر قاعدة البيانات (مهم):
- "ورشة عمل المقاولين" في قاعدة البيانات = يُسمى "لقاء المقاولين" في الإجابات
- "ورشة عمل المكاتب الهندسية" في قاعدة البيانات = يُسمى "لقاء المكاتب الهندسية" في الإجابات
- الورش الأربع الحقيقية هي فقط: التجمع التجاري، العقاري، الإنتاجي، الصحي (2025)
- إذا سألوا "كم عدد ورش العمل؟" = 4 ورش (2025) فقط

=== قائمة التحديات الكاملة (145 تحدي) ===
ت1.[ورشة عمل المقاولين] صعوبة تواصل المقاولين مع الأمانة لكثرة الإدارات وعدم وجود ضابط اتصال محدد لإدارة التواصل بين الأطراف الداخلية للأمانة
ت2.[ورشة عمل المقاولين] ضعف التواصل بين إدارة المشاريع مع الجهات الرقابية في الأمانة حيث ان كثير القرارات و التعديلات لا تصل الى الجهات الرقابية والمراقبين في الميدان
ت3.[ورشة عمل المقاولين] يعاني مقاولني التشغيل والصيانة أو مقاولني الطرق بحيث إذا كان عنده أكثر من سبع معدات يجبر على فتح سجل جديد سجل نقل بالإضافة الى سجل التشغيلي القائم لديه وهذا له تبيعات كبيرة
ت4.[ورشة عمل المقاولين] صعوبة في صرف المستحقات الخاصة بالمقاولين
ت5.[ورشة عمل المقاولين] صعوبة إيجاد مواقع وأراضي داخل منطقة الرياض تخدم مشاريع المقاولين والأمانة من ناحية السيول ومواقف المعدات والصيانة والدعم الخ ...
ت6.[ورشة عمل المقاولين] يعاني المقاولين من محدودية الوقت الذي توفره إدارة المرور في أعمال الصيانة مما ينعكس على جودة الأعمال المقدمة
ت7.[ورشة عمل المقاولين] يعاني المقاولين العاملين في المدينة من أوقات العمل الخاصة بمكبات النفايات وأغلاقها في فترة الليل وهي الفترة الأهم في عملية نقل المخلفات
ت8.[ورشة عمل المقاولين] احتياج لإصدار ترخيص أو رخص شمولية لصيانة الترقيعات لصعوبة الحصول على ترخيص لكل رقعة
ت9.[ورشة عمل المقاولين] صعوبة التواصل مع الجهات الخدمية من قبل المقاولين لذلك يرون انه من الأفضل يكون المسؤول عن التواصل مع الجهات الخدمية هي الأمانة لتسريع الرد والتجاوب
ت10.[ورشة عمل المقاولين] اجبار المشاريع الكبيرة على وضع منطقة تنظيف للمعدات قبل الخروج من المشروع لتقليل الاضرار الناتجة من خروج المعدات متسخة مما يأثر على جودة الحياة
ت11.[ورشة عمل المقاولين] تعدد الجهات المصدرة للمخالفات مع العلم أنه يتم أيقاف الرخصة حتى لو كانت المخالفة منظورة في لجنة الاعتراضات
ت12.[ورشة عمل المقاولين] يعاني مقاولني المشاريع الخاصة من مخالفات المرور أثناء الصب بسبب أقفال بعض الشوارع مع أن الوقت المتاح غير كافي لذلك
ت13.[ورشة عمل المقاولين] في حال ظهور مياه في بعض المشاريع (مثل الياسمين) يكون المقاول محدود بأوقات السحب والنقل مما يؤثر على مدة المشروع والتفريق ويقترح إعطاء ترخيص خاص لتفريغها في مجاري الصرف الخاص بالأمانة
ت14.[ورشة عمل المقاولين] عقد اجتماع تنفيذي كل ثلاث شهور للوقوف على التحديات واتخاذ القرارات بخصوصها
ت15.[ورشة عمل المكاتب الهندسية] تطوير آلية دخول منسوبي المكاتب الهندسية اثناء متابعة الطلبات لتصبح بدون موعد عبر تزويدهم ببطاقة دخول متكرر (مثال: بطاقة مهنية للمحامين المعمول بها في وزارة العدل)

ت17.[ورشة عمل المكاتب الهندسية] تسهيل الوصول للوائح والتعاميم كاملة في موقع الأمانة.
ت18.[ورشة عمل المكاتب الهندسية] هناك فروقات في إجراءات التقارير المساحية بين منصة بلدي وإجراءات الأمانة.
ت19.[ورشة عمل المكاتب الهندسية] عدم وضوح تشريعات الأمانة. ومعالجتها بإصدار أدلة تفصيلية لجميع أنواع الرخص
ت20.[ورشة عمل المكاتب الهندسية] معالجة البيروقراطية من خلال إعلان التحول الرقمي بخصوص عملية تقديم ومعالجة المخططات تكون مؤتمتة بالكامل

ت26.[ورشة عمل المكاتب الهندسية] رفع التعاون بين لجنة التظلمات والمكاتب الهندسية.

ت29.[ورشة عمل المكاتب الهندسية] تحديث آلية رفع الملفات لتسع لملفات أكبر حيث ان بعض المشاريع كبيرة جدا
ت30.[ورشة عمل المكاتب الهندسية] تطوير آلية للاستفادة من الذكاء الصناعي لقراءة الاوتوكاد
ت31.[ورشة عمل المكاتب الهندسية] انشاء منصة لمتابعة معلومات الطلبات وملاحظات المهندس المختص وكذلك ملاحظات الجهات الخارجية مثل الهيئة حول الطلب حتى تصبح الملاحظات متاحة للمكتب الهندسي.
ت32.[ورشة عمل المكاتب الهندسية] تحديث دائم ومستمر للبوابة المكانية لضمان دقة بيانات الأراضي.
ت33.[ورشة عمل المكاتب الهندسية] إدراج نظام الاحداثيات لمدينة الرياض على نظام الخرائط الجيومكانية

ت35.[ورشة عمل المكاتب الهندسية] الإعلان تأسيس بعض الوحدات الداخلية القائمة على التكامل مع المكاتب الهندسية
ت36.[ورشة عمل المكاتب الهندسية] رفع التنسيق مع هيئة المهندسين و أخذ مربياتهم حول اللوائح والانظمة

ت55.[غرفة الرياض] صعوبة توفير عدد المواقف المطلوبة الذي يتطلب 54 % من مساحة الأرض [لم يتم]
ت56.[غرفة الرياض] تقع العمائر السكنية مثل الماجديه ومكين على شوارع تجارية، ومع كثافة السكان وتوفر موقف واحد فقط، يضطر بعض السكان لإيقاف سياراتهم بشكل مخالف، مما يؤثر سلبًا على حركة المشاة ويخالف أنظمة المرور. لذلك، [لم يتم]
ت57.[غرفة الرياض] طول الفترة الزمنية لإنهاء بعض الإجراءات المتعلقة بالتعليم مثل اصدار التراخيص وتجديدها [تم التنفيذ]
ت58.[غرفة الرياض] يواجه المستثمرون تحديات متكررة للحصول على التراخيص الازمة لتطوير مشاريعهم الواقعة على المحاور الرئيسية مما يسبب عدم يقين في جدولة المشاريع [تم التنفيذ]
ت59.[لقاء القطاع الخاص الأول] آلية التواصل بين الأمانة والمكاتب الهندسية والمستفيدين [تم التنفيذ]
ت60.[لقاء القطاع الخاص الأول] دراسة عدد المواقف المطلوبة [تم التنفيذ]
ت61.[لقاء القطاع الخاص الأول] السماح بالصيانات الخفيفة ضمن مراكز الايواء" تأجير السيارات" [تم التنفيذ]
ت62.[لقاء القطاع الخاص الأول] عدم إصدار ترخيص مؤقت لتجهيز موقع لحين اصدار الترخيص النهائي [تم التنفيذ]
ت63.[لقاء القطاع الخاص الأول] طول المدة المستغرقة من الأمانة لإصدار القرارات المساحية والتواصل مع وزارة العدل بهذا الخصوص [تم التنفيذ]
ت64.[لقاء القطاع الخاص الأول] تأخير إصدار الرخص المهنية وربطها بالعقود الالكترونية [تم التنفيذ]
ت65.[لقاء القطاع الخاص الأول] البلدية تطلب تعديل عقد الايجار، وعقد الايجار لا يمكن تعديله، انما يلغى)ويدفع لإلغائه رسوم، وتكمن المشكلة الأخرى في حال لم يتم الغاء العقد فان البلدية ستحتسب الرسوم بناء على مساحة عقد الايجار [تم التنفيذ]
ت66.[لقاء القطاع الخاص الأول] عدم العلم بأعمال الصيانة امام المحلات التجارية [تم التنفيذ]
ت67.[لقاء القطاع الخاص الأول] عدم السماح بتجزئة الأراضي الخام الواقعة داخل النطاق العمراني أو خارج النطاق العمراني [تم التنفيذ]
ت68.[غرفة الرياض] عدم توفر احتياجات واشتراطات مكاتب تأجير السيارات من المساحات المشروطة وكذلك المواقف [لم يتم]
ت69.[غرفة الرياض] ضعف البنية التحتية للمواقع المخصصة للمستثمرين للقطاع البيئي [تم التنفيذ]
ت70.[لقاء القطاع الخاص الأول] تحديات تواجه الحركة اللوجستية في مدينة الرياض [تم التنفيذ]
ت71.[غرفة الرياض] الاشتراطات الصادرة من امانة الرياض لإصدار تراخيص النقل [لم يتم]
ت72.[لقاء القطاع الخاص الأول] تحدي الحصول على مواقع  إيواء الشاحنات داخل المدينة [تم التنفيذ]
ت73.[لقاء القطاع الخاص الأول] ضعف تكامل سلاسل الامداد اللوجستية البرية في مدينة الرياض مع شبكة النقل البحري  قي المملكة. [تم التنفيذ]
ت74.[لقاء القطاع الخاص الأول] عدم وجود نظام واضح لاشتراطات الملصقات الاعلانية والغير اعلانية [تم التنفيذ]
ت75.[لقاء القطاع الخاص الأول] احتضان ريادي الأعمال ذو الافكار والأعمال الجديدة على الاسواق، ويجب التفرقة بين شروط ممارسة نشاط رائد الأعمال عن التاجر [تم التنفيذ]
ت76.[ورشة عمل التجمع التجاري والاستثماري] قلة الوعي قبل طرح الفرص الاستثمارية  وطرح بعض الفرص الاستثمارية دون علم المستثمرين [جاري العمل]
ت77.[ورشة عمل التجمع الإنتاجي واللوجستي] يواجه المستثمرون تحديًا يتمثل في عدم توفر فرص استثمارية متكاملة من ناحية البنية التحتية وجاهزة للتنفيذ، حيث تتطلب معظم الفرص الحالية إجراءات متعددة، ما يخلق عوائق تنظيمية ويطيل زمن بدء الاستثمار ويزيد من مستوى المخاطر. [تم التنفيذ]
ت78.[ورشة عمل التجمع العقاري والسياحي] يواجه تنظيم الفعاليات داخل الأحياء السكنية تحديًا يتمثل في غياب نظام وتشريع مخصص لإقامة الفعاليات الموسمية والدائمة، إلى جانب عدم توفر مواقع محددة ومهيأة ببنية تحتية مناسبة تشمل الخدمات المساندة. وقد أدى ذلك إلى عشوائية في إقامة الفعاليات، وصعوبات تنظيمية، وتأثيرات سلبية على السكان وجودة الحياة. [لم يتم]
ت79.[ورشة عمل التجمع الإنتاجي واللوجستي] يواجه المستثمرون تحديًا يتمثل في محدودية عدد التراخيص الممنوحة لسكن العمالة مقارنة بحجم الطلب الفعلي، مما يضطرهم إلى اللجوء لاستئجار سكنات غير نظامية داخل المدينة لتغطية احتياجاتهم التشغيلية. وقد نتج عن ذلك انتشار سكنات مخالِفة داخل الأحياء، وصعوبة الرقابة عليها،  الأمر الذي يؤثر سلبًا على جودة الحياة والتنظيم العمراني. [لم يتم]
ت80.[ورشة عمل التجمع التجاري والاستثماري] تطوير نظام رقابي ذكي يعتمد على تصنيف المنشآت وفق مستوى الالتزام، بما يسهم في توجيه الزيارات الميدانية حسب درجة المخاطر وتعزيز كفاءة الرقابة
ت81.[ورشة عمل التجمع الصحي والتعليمي] عدم وجود آلية تواصل مباشرة  مع الإدارة المعنية داخل منصة الأمانة توضح أسباب عدم التجديد وأسباب المخالفة والملاحظات بشكل فوري.
ت82.[ورشة عمل التجمع الصحي والتعليمي] عدم وجود نظام لقياس أداء وتصنيف المكاتب الهندسية مما يؤثر على جودة المخرجات والعمل مع مكاتب لاتفهم اشتراطات الأمانة بشكل واضح
ت83.[ورشة عمل التجمع العقاري والسياحي] يواجه تنفيذ المشاريع تحديًا يتمثل في تأخر إصدار الرخص نتيجة تعدد الجهات المعنية وتنوع الاشتراطات المطلوبة، مما يؤدي إلى إطالة الإجراءات وتعطيل بدء المشاريع ورفع تكلفتها. وقد نتج عن ذلك تعثر الجداول الزمنية وضعف كفاءة دورة الترخيص.
ت84.[ورشة عمل التجمع العقاري والسياحي] واجه تنفيذ المشاريع تحديًا يتمثل في تأخر مراجعة واعتماد المخططات الهندسية، مما يؤدي إلى تعطيل بدء التنفيذ وإطالة الجداول الزمنية وارتفاع التكاليف على المستثمرين والمقاولين. ويعود ذلك إلى تعدد مراحل المراجعة وضعف وضوح مسارات الاعتماد والمتابعة.
ت85.[ورشة عمل التجمع الإنتاجي واللوجستي] تعتمد طرق ري الحدائق داخل المدينة حاليًا على اجتهادات فردية تختلف من حديقة إلى أخرى، دون وجود آلية واضحة أو أسلوب موحّد يتم تطبيقه بشكل رسمي.  هذا يعني أن بعض الحدائق تُروى بكميات أكبر من حاجتها، بينما حدائق أخرى قد لا تحصل على الري الكافي، مما يؤثر على جودة المسطحات الخضراء ويؤدي إلى هدر كبير في المياه.
ت86.[ورشة عمل التجمع الإنتاجي واللوجستي] يواجه المستثمرون تحديًا يتمثل في محدودية عدد التراخيص الممنوحة لسكن العمالة مقارنة بحجم الطلب الفعلي، مما يضطرهم إلى اللجوء لاستئجار سكنات غير نظامية داخل المدينة لتغطية احتياجاتهم التشغيلية. وقد نتج عن ذلك انتشار سكنات مخالِفة داخل الأحياء، وصعوبة الرقابة عليها،  الأمر الذي يؤثر سلبًا على جودة الحياة والتنظيم العمراني.
ت87.[ورشة عمل التجمع الإنتاجي واللوجستي] التحدي يتمثل في وجود تجمعات كبيرة للعمالة في أطراف المدينة دون رقابة أو تنظيم واضح، مما يؤدي إلى إرباك أمني، وتشوه بصري وعمراني، ويؤثر سلبًا على كفاءة الخدمات اللوجستية والأنشطة الاقتصادية التي تعتمد على عمالة كثيفة. ويعود هذا التحدي إلى عدم إتاحة طلب تراخيص نظامية لسكن العمالة في تلك المناطق، ما يدفع إلى نشوء تجمعات عشوائية خارج إطار التنظيم الرسمي.
ت88.[ورشة عمل التجمع العقاري والسياحي] التحدي يتمثل في غياب نسبة إلزامية واضحة مخصصة لقطاع الترفيه ضمن مخططات الأراضي الخام، مما يجعل إدراج الأنشطة الترفيهية خاضعًا للاجتهادات الفردية أو اختيارات المطورين، وينتج عنه ضعف انتشار المرافق الترفيهية داخل الأحياء. وقد انعكس ذلك على جودة الحياة وتوازن استخدامات الأراضي.
ت89.[ورشة عمل التجمع الإنتاجي واللوجستي] تعتمد طرق ري الحدائق داخل المدينة حاليًا على اجتهادات فردية تختلف من حديقة إلى أخرى، دون وجود آلية واضحة أو أسلوب موحّد يتم تطبيقه بشكل رسمي.  هذا يعني أن بعض الحدائق تُروى بكميات أكبر من حاجتها، بينما حدائق أخرى قد لا تحصل على الري الكافي، مما يؤثر على جودة المسطحات الخضراء ويؤدي إلى هدر كبير في المياه.
ت90.[ورشة عمل التجمع التجاري والاستثماري] انخفاض الوعي في مخاطر القطاعات التجارية وفهم السوق لدى المنشآت الصغيرة والمتوسطة بعد بدء النشاط التجاري
ت91.[ورشة عمل التجمع التجاري والاستثماري] ارتفاع تكلفة الدخول للسوق للمنشآت الصغيرة ومتناهية الصغر وعدم إمكانية إصدار التراخيص للمساحات المشتركة الصغيرة (أقل من الحد الأدنى) مما يعيق االتوسع والتمويل
ت92.[ورشة عمل التجمع التجاري والاستثماري] تعدد اللوائح والأنظمة وعدم استشارة ومشاركة القطاع الخاص في اللوائح الجديدة التي سيتم اعتمادها وستطبق عليهم
ت93.[ورشة عمل التجمع التجاري والاستثماري] بعض الاشتراطات والمخالفات لاتكون مفهومة بشكل كامل من القطاع الخاص وقد ينتج عنها تأخير في اصدار التراخيص او حتى فهم أسباب المخالفات
ت94.[ورشة عمل التجمع التجاري والاستثماري] تطوير نظام رقابي ذكي يعتمد على تصنيف المنشآت وفق مستوى الالتزام، بما يسهم في توجيه الزيارات الميدانية حسب درجة المخاطر وتعزيز كفاءة الرقابة
ت95.[ورشة عمل التجمع التجاري والاستثماري] تأجير اغلب مواقف المجمعات التجارية من قبل مالك المجمع لشركات  صف السيارات ال(فاليه) مما يؤثر على رواد المحلات، يجب ان يكون جزء قليل من المواقف لشركات  صف السيارات ال(فاليه)
ت96.[ورشة عمل التجمع الصحي والتعليمي] تعدد الجهات المحصلة لرسوم النظافة للعماير التجارية من المستأجرين، عن طريق الأمانة ومن مالك العقار
ت97.[ورشة عمل التجمع الصحي والتعليمي] السماح بوضع اللوحات الإرشادية المعتمدة للمراكز الصحية على المباني الغير مستقلة تسهيلًا لوصول المستفيدين وتحسين تجربة الطوارئ.
ت98.[ورشة عمل التجمع الصحي والتعليمي] احتكار استخراج الشهادات الصحية للعمالة (الاختبار) من شركة واحدة مما يرفع التكلفة ويتسبب بتأخير الإجراءات
ت99.[ورشة عمل التجمع الصحي والتعليمي] تبني نموذج اشتراطات أساسية وثانوية للقطاع التعليمي بسبب الروزنامة التعليمية يسمح بإصدار ترخيص جزئي بناءً على الاشترطات الأساسية مع استكمال الثانوية لاحقًا.
ت100.[ورشة عمل التجمع الصحي والتعليمي] عدم مراعاة طبيعة الأنشطة في الرسوم المالية وتوزيع فترات التجديد لتقليل الأثر المالي على المنشآت.
ت101.[ورشة عمل التجمع الصحي والتعليمي] عدم وجود نظام لقياس أداء وتصنيف المكاتب الهندسية مما يؤثر على جودة المخرجات والعمل مع مكاتب لاتفهم اشتراطات الأمانة بشكل واضح
ت102.[ورشة عمل التجمع الصحي والتعليمي] عدم السماح بفتح بوابات متعددة للمدارس في مواقع مختلفة لتوزيع الحركة المرورية وتقليل الازدحام.
ت103.[ورشة عمل التجمع الصحي والتعليمي] تعامل الأمانة مراكز التدريب باشتراطات مماثلة للمدارس، مثل إلزامها بتوفير حاويات ومكابس للنفايات، على الرغم من اختلاف طبيعة نشاطها وحجم النفايات الناتجة عنها
ت104.[ورشة عمل التجمع الإنتاجي واللوجستي] تواجه المنشآت التجارية تحديًا يتمثل في إلزامها بتطبيق زي موحد لجميع الموظفين رغم ما يترتب على ذلك من تكاليف تشغيلية مرتفعة، خاصة على المنشآت الصغيرة ومتناهية الصغر، مما أدى إلى ارتفاع عدد المخالفات المرتبطة بهذا الاشتراط. وقد انعكس ذلك سلبًا على الامتثال النظامي وأثقل كاهل أصحاب الأنشطة دون تحقيق أثر واضح يتناسب مع حجم التكلفة.
ت105.[ورشة عمل التجمع الإنتاجي واللوجستي] تواجه المحلات التجارية تحديًا ناتجًا عن اشتراط عقود النظافة ووجود حاوية خاصة لكل محل من المحلات التي في عمائر غير مستقلة، في حين أن العديد من المواقع التجارية ذات مساحات صغيرة ولا تتوفر فيها أماكن مناسبة لوضع الحاويات. وقد أدى ذلك إلى مخالفات متكررة دون قدرة فعلية على الامتثال. [لم يتم]
ت106.[ورشة عمل التجمع الإنتاجي واللوجستي] تواجه الأنشطة المرتبطة بوسائل النقل الخفيفة، مثل دراجات التوصيل، تحديًا يتمثل في إلزامها بتوفير مواقف داخل أسوار مخصصة رغم الطبيعة المتنقلة لهذا النوع من الأنشطة وعدم توفر مواقع مناسبة لذلك. وقد تفاقم التحدي نتيجة ارتباطه بنقص سكن العمالة النظامي، حيث يحتاج العاملون إلى مواقف داخل مواقع السكن المعتمدة، ما أدى إلى صعوبة الامتثال وارتفاع المخالفات.
ت107.[ورشة عمل التجمع الإنتاجي واللوجستي] تواجه رخص المزارع تحديات متعددة تتمثل في اختلاف الاشتراطات التنظيمية، وصعوبة إجراءات استخراج وتجديد التراخيص، وتداخل الصلاحيات بين الجهات ذات العلاقة، إضافة إلى غياب الوضوح والربط الفعّال بين الأمانة ووزارة البيئة والمياه والزراعة. وقد أسهم ذلك في إرباك المزارعين، وضعف الامتثال، وظهور ممارسات غير نظامية مثل استخدام بعض الأراضي الزراعية لردم النفايات.
ت108.[ورشة عمل التجمع الإنتاجي واللوجستي] تواجه المنظومة الرقابية تحديًا يتمثل في توحيد قيمة الغرامات المالية على جميع المنشآت دون مراعاة حجم المنشأة أو طبيعة نشاطها، مما يفرض عبئًا غير متناسب على المنشآت الصغيرة ومتناهية الصغر مقارنة بالمنشآت الكبيرة. وقد أدى ذلك إلى تأثيرات سلبية على استدامة بعض الأنشطة التجارية، وضعف تقبل الإجراءات الرقابية.
ت109.[ورشة عمل التجمع الإنتاجي واللوجستي] تواجه الجهات الخدمية تحديًا يتمثل في عدم وضوح رحلة الطلب أو المعاملة للمستفيدين، حيث يفتقر المتقدمون إلى فهم المراحل التي تمر بها معاملاتهم، والجهات المعنية بكل مرحلة، والزمن المتوقع للإنجاز. وقد أدى ذلك إلى حالة من الإرباك، وكثرة الاستفسارات، والتأخر في الإجراءات.
ت110.[ورشة عمل التجمع العقاري والسياحي] التحدي يتمثل في عدم توحيد وتصنيف  المراكز التجاري، إلى جانب غياب إطار واضح لتنظيم الشاشات الإعلانية والدعائية داخلها، مما أدى إلى تفاوت في التطبيقات الرقابية، واجتهادات مختلفة في الترخيص، وتشوه بصري داخل بعض المراكز. وقد انعكس ذلك على تجربة الزوار وعلى كفاءة التنظيم والرقابة.
ت111.[ورشة عمل التجمع العقاري والسياحي] تواجه أعمال التفتيش البلدي تحديًا يتمثل في عدم توحيد إجراءات التفتيش وغياب الوضوح الكامل لمتطلبات المفتش البلدي، مما يؤدي إلى تفاوت في تطبيق اللوائح، واختلاف التفسيرات، وتباين الملاحظات والمخالفات بين المواقع المتشابهة. وقد انعكس ذلك على مستوى الامتثال وثقة المستفيدين في الإجراءات الرقابية.
ت112.[ورشة عمل التجمع العقاري والسياحي] يواجه قطاع التطوير العقاري تحديًا يتمثل في عدم وجود مسارات مخصصة وواضحة لمتابعة المعاملات، مما يؤدي إلى تداخل الطلبات، وتأخر الإجراءات، وصعوبة التنسيق مع الجهات ذات العلاقة، ويؤثر سلبًا على سرعة تنفيذ المشاريع العقارية. وقد نتج عن ذلك ارتفاع مستوى التعقيد وعدم وضوح المسؤوليات خلال رحلة المعاملة.
ت113.[ورشة عمل التجمع العقاري والسياحي] تواجه المنظومة التنظيمية تحديًا يتمثل في عدم وضوح التشريعات للمستفيدين وضعف التوعية بالتشريعات أو التعديلات الجديدة الصادرة عن الأمانة، مما يؤدي إلى ارتكاب مخالفات غير مقصودة، وكثرة الاستفسارات، وضعف الامتثال.
ت114.[ورشة عمل التجمع العقاري والسياحي] يواجه قطاع الفنادق تحديًا يتمثل في عدم وضوح معامل البناء والاشتراطات التنظيمية الخاصة بالأبراج الفندقية، إضافة إلى غياب إطار واضح لإجراءات تراخيص الفنادق والكروت الصحية لعمالها، مما يؤدي إلى إرباك المستثمرين وتأخير المشاريع وارتفاع التكاليف التشغيلية. وقد انعكس ذلك على وتيرة التوسع الفندقي رغم توجه الدولة لزيادة عدد الغرف السياحية، خاصة في المواقع الاستراتيجية مثل طريق مطار الملك خالد.
ت115.[ورشة عمل التجمع العقاري والسياحي] يواجه تنفيذ المشاريع تحديًا يتمثل في تأخر إصدار الرخص نتيجة تعدد الجهات المعنية وتنوع الاشتراطات المطلوبة، مما يؤدي إلى إطالة الإجراءات وتعطيل بدء المشاريع ورفع تكلفتها. وقد نتج عن ذلك تعثر الجداول الزمنية وضعف كفاءة دورة الترخيص.
ت116.[ورشة عمل التجمع العقاري والسياحي] واجه تنفيذ المشاريع تحديًا يتمثل في تأخر مراجعة واعتماد المخططات الهندسية، مما يؤدي إلى تعطيل بدء التنفيذ وإطالة الجداول الزمنية وارتفاع التكاليف على المستثمرين والمقاولين. ويعود ذلك إلى تعدد مراحل المراجعة وضعف وضوح مسارات الاعتماد والمتابعة.
ت117.[ورشة عمل التجمع العقاري والسياحي] تواجه المشاريع الحكومية والخاصة تحديًا يتمثل في ضعف تطبيق إجراءات السلامة في مواقع العمل، مما يزيد من مخاطر الحوادث والإصابات ويؤثر على استمرارية المشاريع وسمعة الجهات المنفذة. ويعود ذلك إلى قصور في وضوح التشريعات أو ضعف الرقابة وتفاوت تطبيق المخالفات.
ت118.[ورشة عمل التجمع التجاري والاستثماري] دفع أصحاب المحلات  والمراكز الصحية  رسوم مواقف الرياض للمواقف التي امام محلاتهم  ومراكزهم
ت119.[قناة التواصل] الفكره هي التنسيق مع بنك Stcbank لتوفير مبلغ شهري في حساب المستفيد في الفتره من ١٨ حتى ٢٢ من كل شهر ميلادي لتوفير الاحتياجات الضرورية للأسر من البقالات والتموينات داخل الأحياء السكنية ويستقطع المبلغ من راتب المستفيد أو حسابه مقابل رسوم خدمه سنويه عليه ايظا يتطلب ذلك من أصحاب التموينات التسجيل في الخدمه مقابل رسوم شهريه أو سنويه ( جائت الفكره من وجود دفاتر في التموينات يسجل فيها ديون على بعض سكان الحي بمسمى تسجيل على الحساب) والهدف من الفكره هو تنظيم طريقه رسميه للدفع بالتعاون مع البنك وإيقاف الطرق العشوائيه التي ربما يكون فيها مخالفات مالية أو اجتماعيه أو عماليه مما يتسبب فى ضياع حقوق البعض ، ولتوفير الاحتياجات الضرورية والاساسيه للسكان. [جاري العمل]
ت138.[قناة التواصل] السلام عليكم ورحمة الله،،،    نحن في شركة قدرات وشركة Langmatz GmbH الألمانية نتقدم رسميًا بطلب لعرض حلولنا للبنية التحتية تحت الأرض أمام أمانة الرياض.    صُممت حلولنا خصيصًا لتعزيز الجمالية العمرانية للرياض من خلال تقليل التشويش البصري فوق سطح الأرض، تعد حلولنا كبديل للاستغناء عن الكبائن والصناديق التقليدية للأنظمة المختلفة (اتصالات وكهرباء وأنظمة التحكم )التي تسبب تشوها بصريا وتتعرض للتلف المباشر ، حلولنا مخفية وآمنة ولا تتطلب عمليات صيانة واستبدال متكررة. مع توفير منصة متينة ومستقبلية للطاقة وتكنولوجيا المعلومات والاتصالات والبنية التحتية للمدن الذكية. وتتوافق هذه الحلول مع أهداف المشاريع التطويرية واسعة النطاق ومشاريع المرافق العامة التي تُنفذ تحت مظلة أمانة الرياض.    وقد طُبقت هذه الحلول بنجاح في بيئات حضرية عالمية كبرى. وهي مناسبة بشكل خاص للمشاريع الضخمة، والمساحات العامة، والشوارع الرئيسية، والحدائق، والمشاريع التطويرية البارزة، حيث تُعد الجودة المعمارية والاستدامة والكفاءة التشغيلية طويلة الأجل عناصر بالغة الأهمية.    ونعتقد أن هذا النهج يدعم مهمة الهيئة الملكية لمدينة الرياض في توفير بيئة حضرية متكاملة وعالية الجودة ، مع تمكين بنية تحتية قابلة للتطوير للمشاريع الحالية والمستقبلية.     نُقدّر لكم إتاحة الفرصة لنا للقاء الفريق أو القسم المعني لعرض الحل بتفصيل أكبر ومناقشة تطبيقاته المحتملة ضمن مشاريع الأمانة الحالية أو المستقبلية.     نشكركم على وقتكم واهتمامكم. نتطلع إلى توجيهاتكم بشأن الخطوات التالية المناسبة.    https://drive.google.com/file/d/1Q92s2_1M8f8IkxM19OYMQid9L9AsvxX0/view?usp=drive_link  https://drive.google.com/file/d/1fzBkIST6Ei7BPPMRVqkzUlcWMweMLEpt/view?usp=drive_link  https://langmatz.de/en/products/underground-distribution-systems [تم التنفيذ]
ت144.[قناة التواصل] نحن شركة Adeco Group، نمتلك خبرة واسعة في تقديم الحلول والخدمات البيئية المبتكرة لدعم مشاريع الاستدامة وحماية البيئة. نرغب في التعاون مع الأمانة لتقديم خدماتنا التي تشمل [ إصدار و تجديد التصريح البيئي - إعداد دراسات التدقيق البيئي - و دراسات تقييم الأثر البيئى - خطط الإدارة البيئية - السجلات والتقارير البيئية الدورية )و( شهادات الايزو بأنواعها , كما تضم مجموعة الدهيمان قسم تأهيل الجودة - الطاقة المتجددة - تشغيل المختبرات .].  نرفق بروفايل الشركة لمراجعتكم، ونتطلع لمناقشة فرص التعاون وتقديم خدماتنا بما يساهم في تعزيز الاستدامة البيئية في مدينة الرياض. [تم التنفيذ]

ت156.[قناة التواصل] معكم ابتهال العنزي من شركة الدرة المئوية للتجارة، وهي شركة سعودية متخصصة في تنظيم وتنفيذ المناسبات، المؤتمرات، الحفلات، الفعاليات، المعارض، إضافة إلى الخدمات العامة، اللوجستية والتغذية.    يسعدنا أن نقدم خدماتنا لشركتكم الموقرة ونتطلع إلى فرصة التعاون معكم لتحقيق نتائج متميزة.  ولأجل ذلك، نرجو منكم التكرم بتزويدنا بمعلومات التواصل الخاصة بـ:    -قسم العلاقات المؤسسية    -قسم المشتريات    وذلك ليتسنى لنا التنسيق المباشر وتقديم عرضنا بشكل أفضل.    شاكرين ومقدّرين وقتكم الكريم، ونحن على أتم الاستعداد للإجابة عن أي استفسارات.    وتفضلوا بقبول فائق الاحترام والتقدير، [تم التنفيذ]
ت157.[قناة التواصل] يسعدنا في شركة هيكلة الإعمار للمقاولات أن نتقدم لسيادتكم بطلب إدراجنا ضمن قائمة المقاولين المعتمدين لديكم، وذلك رغبةً في التعاون معكم في مشاريعكم داخل المملكة العربية السعودية [تم التنفيذ]
ت175.[قناة التواصل] تم ارفاق الخطاب موضحاً المشكلة والتحدي القائم حاليا وقد اطلع سمو الامين على نموذج الفرع لكون احد النماذج المشرفة، و هذا التحدي قد يكون لدى الكثيرين ولكننا نؤكد على ان حالتنا حالة استثنائية، لاعتمادنا على اعداد اقل بكثير جداً في عدد الاشتراكات لكل فرع، مما يسهم في حل مشكلة الازدحام المروري، ولكننا لم نسلم من العشوائيين في حجز المواقف المخصصة للمبنى ووقوفها بشكل مستمر.  ارسلنا الخطاب وكلنا امل في حل هذا التحدي. [تم التنفيذ]
ت179.[قناة التواصل] بسم الله الرحمن الرحيم  سمو أمين منطقة الرياض المحترم  السلام عليكم ورحمة الله وبركات ه  نحن شركة الاجتيازات للتجارة والمقاولات نعمل في مجال جمع ونقل الأنقاض في مدينة الرياض مرخصين من  قبل أمانة منطقة الرياض والمركز الوطني لإدارة النفايات.  نتقدم إلى سموكم بهذا الخطاب لعرض التحديات التي نواجهها بسبب محدودية مواقع مرادم الأنقاض  في الرياض، حيث لا يوجد سوى مردم واحد غير قادر على استيعاب عدد الناقلين ؛ بسبب ضعف  التشغيل وإدارة المردم ، وذلك مما أدى إلى ازدحام شديد يصل إلى الطرق الرئيسية، وانتظار طويل  يصل إلى سبع ساعات لتفريغ حمولة الحاوية ، متسببا في تعطيل أعمالنا وخسا ئر مادية كبيرة لشركتنا  وصعوبة في تلبية طلبات تفريغ الحاويات ، وذلك أدى إلى تكدس الحاويات في موقع الشركة وعدم  القدرة على سحب الحاويات من مواقع العملاء ، وذلك قد يتسبب في تشوه البصري للمدينة ويؤثر  على البيئة الحضرية ونتيجة للانتظار الطويل قد يلجأ بعض المخالفين إلى تفريغ الحمولة بشكل غير  نظامي على جانب الطرقات والأراضي الفارغة وهذا ما يزيد تعقيد المشكلة  ونظرًا لهذه المعوقات التي تؤثر على نحو مباشر على أعمال القطاع ، وتعرقل جهود تحسين البيئة  الحضرية في مدينة الرياض. إن الوضع الحالي لمرادم الأنقاض لا يتماشى مع متطلبات النمو  العمراني للمدينة، ولا يواكب مستهدفات رؤية المملكة 2030 في تطوير البنية التحتية، وتحسين  جودة الحياة، وتعزيز الاستدامة البيئية .  ، فإننا نلتمس من سموكم الكريم التوجيه العاجل لإيجاد حلول فعالة لهذه المشكلة ، .  وفي هذا السياق، نقترح أن يتم تخصيص عدة مواقع في أطراف مدينة الرياض لاستقبال حاويات  الأنقاض، بحيث يتم تفريغها هناك ثم فرزها وترحيلها لاحقًا، مما يساهم في تسهيل العمل وتقليل  الضغط على المردم الحالي، إلى جانب توفير عائد مالي للأمانة وتحسين جودة الخدمات المقدمة .  نأمل من سموكم النظر في هذا المقترح والتوجيه بما ترونه مناسبًا لحل هذه الأزمة التي تؤثر على  القطاع والمدينة ككل .  نسأل الله لكم التوفيق والسداد ، [تم التنفيذ]

ت202.[قناة التواصل] السلام عليكم  نواجه تحدي في البحث عن موقع لممارسة نشاط النقليات حيث تم نزع ملكية موقعنا الرئيسي ونبحث عن موقع بديل قريب من المدينة الصناعية الثانية وطريق الخرج القديم, نأمل منكم التكرم بالدعم والمساندة وتزويدنا بالأراضي المتاحة للاستثمار.  وشكرا,, [تم التنفيذ]
ت386.[قناة التواصل] نتقدم إليكم نحن شركة لورا الطبية (الشركة في الرياض) برغبتنا في الاستثمار في القطاع الصحي، وذلك من خلال إنشاء مستشفى لعلاج الأمراض النفسية.    نود الاستفسار عن آلية وإجراءات استئجار أو استثمار أرض للمشروع في منطقة الرياض أو نواحيها.    اعتقد أن مناقشة هذا الموضوع بشكل مباشر قد يساعد في توضيح التحدي ويساهم في تسريع الإجراءات اللازمة.    لذا، نأمل منكم التواصل معا هاتفيا او التكرم بتحديد موعد للاجتماع معكم، لنتمكن من مناقشة هذا الأمر بشكل مفصل.  فيصل عبد العزيز  الفليح : 0556455227 [تم التنفيذ]
ت387.[قناة التواصل] السادة المحترمون / المختصون في أمانة منطقة الرياض،    تحية طيبة وبعد،    أود التنسيق معكم لعقد اجتماع مشترك لبحث برنامج أمانة منطقة الرياض لضبط جودة مصانع الخرسانة، وذلك لتبادل الخبرات ومناقشة سبل تطبيق البرنامج في أمانة منطقة الحدود الشمالية، بهدف تعزيز جودة الخرسانة بما يتوافق مع المعايير والمواصفات المطلوبة في المشاريع التنموية.    نهدف من هذا الاجتماع إلى استعراض آليات العمل المتبعة في البرنامج، والتحديات التي قد تواجهها، بالإضافة إلى الفرص المتاحة لتطوير ممارسات ضبط الجودة بشكل فعال يضمن سلامة وجودة البناء.    يرجى منكم التكرم بتحديد موعد مناسب، بحيث يتاح للمختصين من الجهتين حضور الاجتماع والاستفادة من الخبرات المتبادلة. نحن على استعداد لتقديم ما يلزم من معلومات أو ترتيبات لتسهيل التنسيق لهذا اللقاء.    شاكرين لكم حسن تعاونكم واهتمامكم بتطوير الجودة ، ونتطلع إلى تعاون مثمر معكم.    مع خالص التقدير والاحترام،  م.  سلطان المجلاد  مدير إدارة المختبر بأمانة منطقة الحدود الشمالية [تم التنفيذ]
ت391.[قناة التواصل] أود أن أقدم لكم فكرة مشروع جديد باسم "EcoVision"، وهو تطبيق واقع معزز (AR) مخصص لدعم مبادرات مثل "الرياض الخضراء" من خلال تقديم تصور مرئي للتغييرات البيئية والتشجير في المناطق الحضرية في مدينة الرياض.    من خلال التطبيق، يمكن للمستخدمين رؤية كيف ستبدو مناطقهم بعد تطبيق مشاريع التشجير وزيادة المساحات الخضراء. كما يمكن للتطبيق عرض تأثير هذه المشاريع على تحسين جودة الهواء وتقليل درجات الحرارة. بالإضافة إلى ذلك، يقدم التطبيق معلومات تفاعلية حول أهمية هذه المبادرات وكيفية المساهمة في تحقيق أهدافها.    نعتقد أن مشروع "EcoVision" يمكن أن يسهم بشكل كبير في زيادة الوعي بأهمية التشجير والمشاريع البيئية في الرياض. ونحن على استعداد للتعاون معكم لتنفيذ هذا المشروع الذي يتماشى مع رؤيتكم نحو تطوير مدينة الرياض كمدينة خضراء ومستدامة.    نأمل أن تتاح لنا الفرصة لمناقشة هذه الفكرة بشكل مباشر والتعاون معكم لتنفيذها. نرفق لكم ملخصاً تفصيلياً عن الفكرة، ونتطلع إلى ردكم الكريم.    مع خالص التحية والاحترام،  روابي الخلف  مدير شركة احترافية الأفق للتقنية  lda2030sa@gmail.com  0505457376 [تم التنفيذ]
ت396.[قناة التواصل] السلام عليكم ورحمة الله وبركاته  اسمي علي البوريني - خبير بشؤون ذوي الاعاقة ما يقارب العشرين سنة في دول الخليج وحاليا الحمدلله في الرياض - اعمل حاليا علي مشروع تقني جديد لمواقف ذوي الاعاقة واتمني اللقاء معكم والبحث حول المشروع  ولكم جزيل الشكر [تم التنفيذ]
ت401.[قناة التواصل] السلام عليكم ورحمة الله وبركاتة   نحن محلي لأنابيب الفيبرجلاس المستخدمة في مشاريع درء اخطار السيول وتصريف الأمطار. التحدي لدينا يكمن في معرفة المشاريع القادمة والتخطيط الاستراتيجي لها من ناحية تجهيز سلاسل الأمداد وتلبية متطلبات المشاريع في الوقت المناسب والاسعار المناسبة بالجودة المطلوبة .  كذلك عند استلام المنافسات والتسعير في المواصفات التحدي الذي نواجهه هو فروقات المواصفات التي تسبب فروقات السعر بين المتنافسين. [تم التنفيذ]
ت403.[قناة التواصل] السلام عليكم ورحمة الله وبركاتة   محتاجين قوائم موعتمدين للمواد الكهربائية  قسم الحدائق من امانة الرياض [تم التنفيذ]
`;
var convs=[],cur=null,loading=false;
function newChat(){var conv={id:Date.now(),title:'محادثة جديدة',messages:[]};convs.unshift(conv);cur=conv;document.getElementById('ws').style.display='none';document.getElementById('cw').classList.add('act');document.getElementById('msgs').innerHTML='';renderH();document.getElementById('ui').focus();}
function renderH(){var el=document.getElementById('hist');if(!convs.length){el.innerHTML='<li style="color:#7a9a8a;font-size:12px;padding:12px;cursor:default">لا توجد محادثات سابقة</li>';return;}el.innerHTML=convs.map(function(c){return '<li class="'+(c.id===cur.id?'act':'')+'" data-id="'+c.id+'">'+c.title+'</li>';}).join('');el.querySelectorAll('li[data-id]').forEach(function(li){li.addEventListener('click',function(){swch(parseInt(this.getAttribute('data-id')));});});}
function swch(id){cur=convs.find(function(c){return c.id===id;});document.getElementById('ws').style.display='none';document.getElementById('cw').classList.add('act');document.getElementById('msgs').innerHTML='';cur.messages.forEach(function(m){addMsg(m.role,m.content,false);});renderH();}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML.replace(/\n/g,'<br>');}
function addMsg(role,content,animate){if(animate===undefined)animate=true;var msgs=document.getElementById('msgs');var div=document.createElement('div');div.className='msg '+(role==='user'?'u':'a');div.innerHTML='<div class="av">'+(role==='user'?'&#x1F464;':'أم')+'</div><div class="bbl">'+esc(content)+'</div>';if(!animate)div.style.animation='none';msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;}
function addTyp(){var msgs=document.getElementById('msgs');var div=document.createElement('div');div.className='msg a';div.id='typ';div.innerHTML='<div class="av">أم</div><div class="bbl"><div class="typ"><span></span><span></span><span></span></div></div>';msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;}
async function send(){if(loading)return;var text=document.getElementById('ui').value.trim();if(!text)return;if(!cur)newChat();document.getElementById('ui').value='';document.getElementById('ui').style.height='auto';loading=true;document.getElementById('sb').disabled=true;addMsg('user',text);cur.messages.push({role:'user',content:text});if(cur.title==='محادثة جديدة'){cur.title=text.slice(0,28)+(text.length>28?'..':'');renderH();}addTyp();var msgs=cur.messages.slice(-6).slice(0,-1).concat([{role:'user',content:text}]);try{var r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:msgs,system:sys})});var data=await r.json();var t=document.getElementById('typ');if(t)t.remove();var reply=data.content&&data.content[0]&&data.content[0].text?data.content[0].text:'حدث خطأ، حاول مرة أخرى.';addMsg('assistant',reply);cur.messages.push({role:'assistant',content:reply});}catch(e){var t=document.getElementById('typ');if(t)t.remove();addMsg('assistant','حدث خطأ في الاتصال، حاول مرة أخرى.');}loading=false;document.getElementById('sb').disabled=false;}
function askQ(q){if(!cur)newChat();document.getElementById('ui').value=q;send();}
document.getElementById('newBtn').addEventListener('click',newChat);document.getElementById('startBtn').addEventListener('click',newChat);document.getElementById('sb').addEventListener('click',send);
document.getElementById('ui').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
document.getElementById('ui').addEventListener('input',function(){this.style.height='auto';this.style.height=this.scrollHeight+'px';});
['q1','q2','q3','q4'].forEach(function(id){document.getElementById(id).addEventListener('click',function(){askQ(this.textContent);});});
renderH();</script></body></html>
